name: Deploy to Cloudflare Workers

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - production
          - staging
        default: production

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-staging:
    if: github.event.inputs.environment == 'staging'
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v6

    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: "1.2"

    - name: Install dependencies
      run: bun install

    - name: Lint
      run: bun run lint

    - name: Typecheck
      run: bun run typecheck

    - name: Build
      run: bun run build
      env:
        SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        GOOGLE_DRIVE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_DRIVE_SERVICE_ACCOUNT_KEY }}
        RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}
        FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        FIREBASE_RTDB_URL: ${{ secrets.FIREBASE_RTDB_URL }}

    - name: Deploy to Cloudflare Workers (Staging)
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        command: deploy --config wrangler.staging.jsonc

  deploy-production:
    if: github.event.inputs.environment == 'production' || github.event.inputs.environment == ''
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v6

    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: "1.2"

    - name: Install dependencies
      run: bun install

    - name: Lint
      run: bun run lint

    - name: Typecheck
      run: bun run typecheck

    - name: Build
      run: bun run build
      env:
        SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        GOOGLE_DRIVE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_DRIVE_SERVICE_ACCOUNT_KEY }}
        RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}
        FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        FIREBASE_RTDB_URL: ${{ secrets.FIREBASE_RTDB_URL }}

    - name: Deploy to Cloudflare Workers (Production)
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        command: deploy
